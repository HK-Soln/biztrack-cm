name: Deploy desktop-v2 (Cloud → Vercel)

# Deploys the WEB build of apps/desktop-v2 (the cloud version of the app) to Vercel.
# This is the renderer only: `pnpm build:web` (vite.config.web.ts) emits a static SPA to
# apps/desktop-v2/dist. The Electron desktop installer is built separately in
# desktop-v2-release.yml.
#
# ONE Vercel project (free/Hobby friendly): main -> Production, staging -> Preview.
# Vercel project setup (one-time):
#   - Root Directory  = apps/desktop-v2   (vercel.json sets buildCommand/output)
#   - Production Branch = main
#
# IMPORTANT: this job runs `vercel build` in the GitHub RUNNER (off-Vercel), so Vercel's
# project Environment Variables are NOT automatically applied to the build — the renderer's
# VITE_* vars must be passed here from the matching GitHub Environment. Set BOTH keys under
# Settings -> Environments -> {production, staging} -> Variables (same ones the desktop release
# uses):
#   VITE_API_URL          = https://<host>/api/v1     (must include /api/v1)
#   VITE_STOREFRONT_DOMAIN = <storefront root domain>
# The build now HARD-FAILS if either is missing (no localhost fallback), so a misconfigured
# deploy can never silently ship an app pointed at localhost.

on:
  push:
    branches: [main, staging] # main -> Vercel Production, staging -> Vercel Preview
    paths:
      - 'apps/desktop-v2/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/desktop-v2-web.yml'
  workflow_dispatch: {}

concurrency:
  group: desktop-v2-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy (${{ github.ref_name == 'main' && 'production' || 'staging' }})
    runs-on: ubuntu-latest
    # `production` (main) carries the manual-approval gate. One Vercel project serves both
    # environments, so VERCEL_* are repo-level secrets (not per-environment).
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DESKTOP_V2_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # `vercel build` runs the project's install + build in THIS runner, so pnpm + Node
      # must be on PATH — otherwise it fails with "spawn pnpm ENOENT".
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Fail fast if the GitHub Environment is missing a renderer build var — otherwise the build
      # below hard-fails with a less obvious "failed to load config" error.
      - name: Verify required build vars are configured
        run: |
          missing=""
          [ -z "${{ vars.VITE_API_URL }}" ] && missing="$missing VITE_API_URL"
          [ -z "${{ vars.VITE_STOREFRONT_DOMAIN }}" ] && missing="$missing VITE_STOREFRONT_DOMAIN"
          if [ -n "$missing" ]; then
            echo "::error::Missing required var(s) for environment '${{ github.ref_name == 'main' && 'production' || 'staging' }}':$missing. Add under Settings → Environments → {production|staging} → Variables."
            exit 1
          fi

      # main -> Production (--prod); staging -> Preview (no flag).
      - name: Resolve target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "VERCEL_TARGET=production" >> "$GITHUB_ENV"
            echo "PROD_FLAG=--prod" >> "$GITHUB_ENV"
          else
            echo "VERCEL_TARGET=preview" >> "$GITHUB_ENV"
            echo "PROD_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Pull Vercel settings + env
        run: vercel pull --yes --environment=$VERCEL_TARGET --token=${{ secrets.VERCEL_TOKEN }}

      # `vercel build` runs `pnpm build:web` as a subprocess, which reads these from process.env
      # (Vite inlines VITE_* at build). Passing them here is what makes the deployed cloud app talk
      # to the real API instead of localhost.
      - name: Build
        run: vercel build $PROD_FLAG --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_STOREFRONT_DOMAIN: ${{ vars.VITE_STOREFRONT_DOMAIN }}

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt $PROD_FLAG --token=${{ secrets.VERCEL_TOKEN }}
