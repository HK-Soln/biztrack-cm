name: Deploy desktop-v2 (Cloud → Vercel)

# Deploys the WEB build of apps/desktop-v2 (the cloud version of the app) to Vercel.
# This is the renderer only: `pnpm build:web` (vite.config.web.ts) emits a static SPA to
# apps/desktop-v2/dist. The Electron desktop installer is built separately in
# desktop-v2-release.yml.
#
# Vercel project setup (one-time):
#   - Root Directory = apps/desktop-v2   (vercel.json there sets buildCommand/output)
#   - Env var VITE_API_URL = https://<your-api-host>/api/v1  (drives the app + its CSP)

on:
  push:
    branches: [main, staging] # main -> production, staging -> staging
    paths:
      - 'apps/desktop-v2/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/desktop-v2-web.yml'
  workflow_dispatch: {}

concurrency:
  group: desktop-v2-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy (${{ github.ref_name == 'main' && 'production' || 'staging' }})
    runs-on: ubuntu-latest
    # `production` carries the manual-approval gate; the VERCEL_* secrets are
    # ENVIRONMENT-scoped so each env deploys to its own Vercel project (with its own
    # VITE_API_URL). Configure both in Settings -> Environments.
    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DESKTOP_V2_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings + env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Uses vercel.json: buildCommand `pnpm run build:web`, outputDirectory `dist`.
      # VITE_API_URL comes from the Vercel project env pulled above.
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
