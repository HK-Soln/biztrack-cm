name: Release desktop-v2 (Windows)

# Builds the Electron desktop app (apps/desktop-v2, Vite + React) for Windows and
# publishes the NSIS installer to a GitHub Release. Windows-only for now — macOS/Linux
# can be added later as a build matrix (each native OS builds on its own runner because
# better-sqlite3 is a native module and can't be cross-compiled).
#
# Trigger: push a tag like `desktop-v2.0.0` (bump apps/desktop-v2/package.json first).

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch: {}

concurrency:
  group: desktop-v2-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Package & publish (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      # electron-builder output dir (matches directories.output in package.json).
      RELEASE_DIR: apps/desktop-v2/release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Runs desktop-v2's postinstall too, rebuilding better-sqlite3 against Electron's ABI.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Compiles renderer + main/preload (electron-vite). Does NOT run electron-builder.
      # VITE_API_URL is baked into the packaged app at build time (main-process API base
      # URL + renderer CSP). Set the repo variable to your production API, e.g.
      # https://<api-host>/api/v1 (must include the /api/v1 prefix).
      - name: Build app
        working-directory: apps/desktop-v2
        run: pnpm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Package installer (NSIS)
        working-directory: apps/desktop-v2
        run: pnpm exec electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optional signing (unsigned installs work but show a SmartScreen warning).
          # Add as secrets when you have a cert:
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.RELEASE_DIR }}/*.exe
            ${{ env.RELEASE_DIR }}/*.blockmap
            ${{ env.RELEASE_DIR }}/latest.yml
          generate_release_notes: true
          fail_on_unmatched_files: false
