<!doctype html>
<html lang="en" data-theme="light" data-palette="a" data-chrome="neutral">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>BizTrack CM</title>
    <script>
      // No-flash: apply persisted theme attributes before first paint.
      ;(function () {
        try {
          var m = localStorage.getItem('biztrack.theme.mode')
          var p = localStorage.getItem('biztrack.theme.palette')
          var c = localStorage.getItem('biztrack.theme.chrome')
          var e = document.documentElement
          var dark =
            m === 'dark' ||
            ((!m || m === 'system') && window.matchMedia('(prefers-color-scheme: dark)').matches)
          e.setAttribute('data-theme', dark ? 'dark' : 'light')
          e.setAttribute('data-palette', p === 'a' || p === 'b' || p === 'c' || p === 'd' ? p : 'a')
          e.setAttribute('data-chrome', c === 'neutral' || c === 'brand' ? c : 'neutral')
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
