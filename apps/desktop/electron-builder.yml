appId: cm.biztrack.desktop
productName: BizTrack CM
copyright: "Copyright © 2025 BizTrack CM"

directories:
  output: release

files:
  - dist/**/*
  - node_modules/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.business

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

publish:
  provider: github
  owner: Henson-Kudi
  repo: biztrack-cm
